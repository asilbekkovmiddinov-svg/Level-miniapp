name: MiniApp tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: node --test tests/*.test.js
      - run: node --check miniapp/api.js
      - run: node --check miniapp/pages/wallet.js
